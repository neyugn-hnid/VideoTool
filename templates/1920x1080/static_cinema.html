<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Template tĩnh - Cinema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1920px; height: 1080px; overflow: hidden; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            position: relative;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 120px;
        }

        .container {
            width: 100%;
            max-width: 1680px;
            display: flex;
            flex-direction: column;
            gap: 60px;
            position: relative;
            z-index: 2;
        }

        /* Decorative elements */
        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }
        .bg-glow.g1 {
            width: 600px; height: 600px;
            background: #667eea;
            top: -200px; right: -200px;
        }
        .bg-glow.g2 {
            width: 500px; height: 500px;
            background: #764ba2;
            bottom: -200px; left: -150px;
        }

        /* Top bar with title */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.15);
        }
        .brand {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }
        .brand span {
            color: #667eea;
            font-weight: 700;
        }

        /* Title */
        .video-title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(to right, #fff, #a8b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main content area */
        .content-area {
            display: flex;
            gap: 80px;
            align-items: center;
        }

        /* Media placeholder (left or right) */
        .media-side {
            flex-shrink: 0;
            width: 480px;
            height: 480px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-side img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .media-icon {
            font-size: 80px;
            opacity: 0.3;
        }

        /* Text side */
        .text-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .narration-text {
            font-size: 40px;
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255,255,255,0.92);
            min-height: 200px;
            white-space: pre-line;
        }
        .narration-text::before {
            content: '\201C';
            font-size: 64px;
            color: #667eea;
            font-weight: 700;
            margin-right: 8px;
            line-height: 1;
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 30px;
            border-top: 2px solid rgba(255,255,255,0.15);
        }
        .author {
            font-size: 24px;
            color: rgba(255,255,255,0.5);
        }
        .page-num {
            font-size: 20px;
            color: rgba(255,255,255,0.3);
            font-weight: 300;
        }
        .page-num span {
            color: #667eea;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { animation: fadeInUp 0.8s ease-out both; }
    </style>
</head>
<body>
    <!-- Background glow -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>

    <div class="container">
        <!-- Top bar -->
        <div class="top-bar">
            <div class="video-title">{{title}}</div>
            <div class="brand"><span>✦</span> Pixelle</div>
        </div>

        <!-- Content -->
        <div class="content-area">
            <!-- Media (placeholder or image) -->
            <div class="media-side">
                {{media}}
            </div>

            <!-- Text -->
            <div class="text-side">
                <div class="narration-text">{{text}}</div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <div class="author">{{author}}</div>
            <div class="page-num"><span>✦</span> {{describe}}</div>
        </div>
    </div>
</body>
</html>
